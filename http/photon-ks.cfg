{
  "hostname": "offline-depot.lab.aaronrombaut.com",
  "password": {
    "crypted": false,
    "text": "VMware1!"
  },
  "bootmode": "efi",
  "disk": "/dev/sda",
  "partition_type": "gpt",
  "partitions": [
    {
      "mountpoint": "/boot",
      "size": 1024,
      "filesystem": "ext4"
    },
    {
      "size": 8192,
      "filesystem": "swap"
    },
    {
      "mountpoint": "/",
      "size": 0,
      "filesystem": "ext4"
    }
  ],
  "network": [
    {
      "type": "dhcp"
    }
  ],
  "packages": [
    "minimal"
  ],
  "install_linux_esx": true,
  "linux_flavor": "linux-esx",
  "postinstall": [
    "#!/bin/sh",
    "systemctl enable sshd"
  ]
}