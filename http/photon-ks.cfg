{
  "disk": "/dev/sda",
  "partition_type": "gpt",
  "partitions":[
    {"mountpoint": "/", "size": 0, "filesystem": "ext4"},
    {"mountpoint": "/boot", "size": 128, "filesystem": "ext4"},
    {"mountpoint": "/root", "size": 128, "filesystem": "ext4"},
    {"size": 128, "filesystem": "swap"}
  ],
  "network": {
    "version": "2",
    "ethernets": {
      "eth0": {
        "dhcp4": true
      }
    }
  },
  "install_linux_esx": true,
  "hostname": "offline-depot.lab.aaronrombaut.com",
  "password": {
    "crypted": false,
    "text": "VMware1!"
  },
  "bootmode": "efi",
  "packagelist_file": "packages_minimal.json",
  "linux_flavor": "linux-esx",
  "packages": ["minimal", "linux", "initramfs"],
  "postinstall": [
    "#!/bin/sh",
    "cat > /etc/systemd/network/50-eth0.network <<'EOF'",
    "[Match]",
    "Name=eth0",
    "",
    "[Network]",
    "DHCP=ipv4",
    "IPv6AcceptRA=no",
    "EOF",
    "systemctl enable systemd-networkd",
    "systemctl enable sshd",
    "useradd -m -G wheel packer",
    "echo 'packer:VMware1!' | chpasswd",
    "echo 'packer ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/packer",
    "chmod 440 /etc/sudoers.d/packer"
  ]
}